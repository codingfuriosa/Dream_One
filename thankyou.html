<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You — Dream One</title>
<link rel="icon" type="image/png" href="img/do_logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
:root{
  --bg-0:#08070a; --bg-1:#0d0b12; --bg-2:#15111e;
  --line:rgba(255,255,255,.08); --line-2:rgba(255,255,255,.14);
  --ink:#fff; --ink-2:rgba(255,255,255,.72); --ink-3:rgba(255,255,255,.46);
  --purple:#7b3fe4; --purple-deep:#4f3aa6; --purple-light:#b89cff; --purple-glow:rgba(123,63,228,.45);
  --serif:"Instrument Serif",Georgia,serif;
  --sans:"Inter",sans-serif;
  --mono:"JetBrains Mono",monospace;
  --ease:cubic-bezier(.22,.8,.36,1);
}
html,body{background:var(--bg-0);color:var(--ink);font-family:var(--sans);min-height:100vh;overflow-x:hidden;}
body{display:flex;align-items:center;justify-content:center;padding:32px 24px;position:relative;height:100vh;overflow:hidden;transition:opacity .5s ease;}
body.leaving{opacity:0;}
.ty-bg{position:fixed;inset:0;pointer-events:none;z-index:0;background:
  radial-gradient(circle at 20% 20%,rgba(123,63,228,.18),transparent 50%),
  radial-gradient(circle at 80% 80%,rgba(184,156,255,.12),transparent 50%);
  filter:blur(40px);}
.ty-bg-grid{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.4;background-image:
  linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
  linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
  background-size:80px 80px;}
.ty-wrap{position:relative;z-index:2;max-width:680px;width:100%;text-align:center;display:flex;flex-direction:column;align-items:center;gap:0;animation:tyIn 1s var(--ease) both;}
@keyframes tyIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.ty-brand{display:inline-flex;align-items:center;justify-content:center;margin-bottom:clamp(20px,5vh,60px);}
.ty-logo{height:clamp(56px,9vh,80px);width:auto;filter:brightness(0) invert(1);opacity:.9;}
.ty-eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--purple-light);margin-bottom:24px;display:inline-flex;align-items:center;gap:12px;}
.ty-eyebrow::before,.ty-eyebrow::after{content:"";width:24px;height:1px;background:var(--purple-light);opacity:.5;}
.ty-title{font-family:var(--serif);font-weight:400;font-size:clamp(52px,9vw,120px);line-height:1;letter-spacing:-.025em;color:#fff;margin-bottom:6px;}
.ty-divider{width:60px;height:2px;background:linear-gradient(90deg,var(--purple),transparent);margin:clamp(18px,3.5vh,36px) 0 clamp(16px,3vh,32px);}
.ty-sub{font-size:clamp(15px,1.6vw,17px);line-height:1.7;color:var(--ink-2);font-weight:300;max-width:48ch;margin-bottom:clamp(24px,5vh,48px);}
.ty-sub strong{color:#fff;font-weight:500;}
.ty-meta{display:flex;gap:32px;font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-3);margin-bottom:48px;flex-wrap:wrap;justify-content:center;}
.ty-meta b{display:block;font-family:var(--serif);font-size:20px;letter-spacing:0;text-transform:none;color:#fff;margin-top:6px;font-weight:400;}
.ty-actions{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:8px;}
.ty-btn{display:inline-flex;align-items:center;gap:10px;padding:18px 28px;background:var(--purple);color:#fff;border-radius:999px;font-family:var(--mono);font-size:12px;letter-spacing:.22em;text-transform:uppercase;text-decoration:none;transition:background .3s,transform .3s var(--ease);}
.ty-btn:hover{background:var(--purple-deep);transform:translateY(-2px);}
.ty-btn.ghost{background:transparent;border:1px solid var(--line-2);}
.ty-btn.ghost:hover{background:rgba(123,63,228,.08);border-color:var(--purple-light);}
.ty-arrow{transition:transform .35s var(--ease);}
.ty-btn:hover .ty-arrow{transform:translateX(-4px);}
.ty-corner{position:fixed;top:24px;left:24px;z-index:3;font-family:var(--mono);font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--ink-3);display:inline-flex;align-items:center;gap:8px;}
.ty-corner .dot{width:6px;height:6px;background:var(--purple-light);border-radius:50%;box-shadow:0 0 10px var(--purple-glow);}
@media (max-width:600px){
  body{padding:40px 20px;}
  .ty-logo{height:60px;}
  .ty-brand{margin-bottom:40px;}
  .ty-meta{gap:24px;}
  .ty-corner{top:18px;left:18px;font-size:10px;}
  .ty-btn{padding:16px 22px;font-size:11px;}
}
</style>
</head>
<body>

<div class="ty-bg"></div>
<div class="ty-bg-grid"></div>

<div class="ty-corner">
  <span class="dot"></span>
  <span>Dream One · Newtown</span>
</div>

<main class="ty-wrap">

  <div class="ty-brand">
    <img src="img/do_logo.png" alt="Dream One" class="ty-logo">
  </div>

  <h1 class="ty-title">Thank You.</h1>

  <div class="ty-divider"></div>

  <p class="ty-sub">
    Your interest in <strong>Dream One</strong> has been registered. Our team will reach out
    shortly with personalised details, floor plans and pricing.
  </p>

  <div class="ty-actions">
    <a class="ty-btn" href="index.html" onclick="goHome(event)">
      <svg class="ty-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Back to Home
    </a>
  </div>

</main>

<script>
  function goHome(e){
    if (e) e.preventDefault();
    try { sessionStorage.setItem('do:skiploader','1'); } catch (_) {}
    document.body.classList.add('leaving');
    setTimeout(function(){ window.location.href = 'index.html'; }, 480);
  }
</script>

</body>
</html>
